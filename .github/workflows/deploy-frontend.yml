name: Deploy Frontend to S3

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_DEPLOY_ROLE_ARN }}:role/github-actions-bible-frontend-deploy
          aws-region: us-east-1

      - name: Sync frontend to S3
        run: |
          aws s3 sync ./frontend/ s3://${{ vars.FRONTEND_BUCKET }}/ \
            --delete \
            --exclude ".DS_Store" \
            --exclude "*.map"
      - name: Invalidate CloudFront cache after S3
        run: aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*" 