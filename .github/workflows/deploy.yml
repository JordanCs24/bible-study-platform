name: Deploy Lambda Function

on:
  push:
    branches:
      - main
    paths:
      - 'backend/lambda/verse_search/**'

# Required for OIDC: this lets GitHub Actions request an OIDC token
# that AWS will validate against the trust policy on the role.
# Without id-token: write, the auth step fails with a cryptic error.
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::646177707976:role/github-actions-bible-lambda-deploy
          aws-region: us-east-1

      - name: Zip Lambda function
        run: |
          cd backend/lambda/verse_search
          zip -r function.zip handler.py

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name bible-verse-search \
            --zip-file fileb://backend/lambda/verse_search/function.zip